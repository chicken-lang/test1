# pnpm workspace 配置
# 多包结构: apps/web(用户端 Nuxt) / apps/admin(CMS) / apps/server(NestJS) / packages/shared(共享)
packages:
  - 'apps/*'
  - 'packages/*'

# 允许执行构建脚本的依赖(Nuxt/Vite/Cloudflare Workers 运行时需要的原生模块)
# pnpm v11+ 必须用 allowBuilds,旧的 onlyBuiltDependencies 在 v11 被忽略
# Cloudflare Pages 跑 workerd binary,必须显式允许
allowBuilds:
  workerd: true
  esbuild: true
  '@parcel/watcher': true
  sharp: true
  'better-sqlite3': true
  unrs-resolver: true
  vue-demi: true
  '@nuxt/kit': true
  nuxt: true
